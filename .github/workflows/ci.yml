---
name: CI

on:
  push:
    branches:
      - development
      - main
      - "ci-*"
  pull_request:
    branches:
      - development
      - main
  schedule:
      # Runs every Sunday at 00:05 UTC
    - cron: "05 00 * * 0"
  workflow_call:

permissions: {}

concurrency:
  # https://docs.github.com/en/actions/examples/using-concurrency-expressions-and-a-test-matrix
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') || github.ref != 'refs/heads/development' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup proto files
        run: |
          mkdir -p ../tari/applications/minotari_app_grpc/proto
          cd ../tari/applications/minotari_app_grpc/proto
          bash "${GITHUB_WORKSPACE}/scripts/get-protos.sh"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  licenses:
    name: file licenses
    runs-on: [ubuntu-latest]
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: install ripgrep
        run: |
          wget https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep_14.1.0-1_amd64.deb
          sudo dpkg -i ripgrep_14.1.0-1_amd64.deb
          rg --version || exit 1

      - name: run the license check
        run: ./scripts/file_license_check.sh

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features"
          - "--features http"
          - "--features grpc"
          - "--features storage"
          - "--features grpc-storage"
          - "--features http-storage"
          - "--all-features"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup proto files
        run: |
          mkdir -p ../tari/applications/minotari_app_grpc/proto
          cd ../tari/applications/minotari_app_grpc/proto
          bash "${GITHUB_WORKSPACE}/scripts/get-protos.sh"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test ${{ matrix.features }} -- --skip test_large_scale_address_generation --skip test_concurrent_wallet_operations --skip test_concurrent_scanning_operations --skip test_performance_degradation --skip test_large_scale_wallet_generation --skip test_memory_usage_stress --skip test_large_dataset_scanning_performance

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup proto files
        run: |
          mkdir -p ../tari/applications/minotari_app_grpc/proto
          cd ../tari/applications/minotari_app_grpc/proto
          bash "${GITHUB_WORKSPACE}/scripts/get-protos.sh"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate test coverage
        run: |
          cargo tarpaulin \
            --verbose \
            --all-features \
            --workspace \
            --timeout 120 \
            --exclude-files "src/bin/*" "examples/*" "tests/*" \
            --skip-clean \
            --out xml \
            --output-dir coverage \
            -- --skip test_large_scale_address_generation \
               --skip test_concurrent_wallet_operations \
               --skip test_concurrent_scanning_operations \
               --skip test_performance_degradation \
               --skip test_large_scale_wallet_generation \
               --skip test_memory_usage_stress \
               --skip test_large_dataset_scanning_performance

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    needs: check
    if: false # Skip this job
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup proto files
        run: |
          mkdir -p ../tari/applications/minotari_app_grpc/proto
          cd ../tari/applications/minotari_app_grpc/proto
          bash "${GITHUB_WORKSPACE}/scripts/get-protos.sh"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test WASM
        run: wasm-pack test --node --features http 

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        run: cargo install cargo-machete

      - name: Check unused dependencies
        run: cargo machete
