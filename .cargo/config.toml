[target.'cfg(not(target_arch = "wasm32"))']
rustflags = [
    "-D", "dead_code",
    "-D", "unused_imports",
    "-D", "unused_variables",
    "-D", "unreachable_code",
]

[target.'cfg(target_arch = "wasm32")']
rustflags = [
    "-D", "dead_code", 
    "-D", "unused_imports",
    "-D", "unused_variables",
    "-D", "unreachable_code",
]

[build]
# Enable clippy warnings as errors for better code quality
rustflags = [
    "-D", "clippy::all",
    "-D", "clippy::pedantic",
    "-W", "clippy::nursery",
    "-A", "clippy::missing_errors_doc",
    "-A", "clippy::missing_panics_doc",
    "-A", "clippy::must_use_candidate",
    "-A", "clippy::module_name_repetitions",
]


[alias]
ci-fmt = "fmt --all -- --check"
ci-fmt-fix = "fmt --all"
ci-clippy = "lints clippy --all-targets --all-features -- -A clippy::literal_string_with_formatting_args"
ci-test-compile = "test --no-run --workspace --all-features --no-default-features"
ci-test = "nextest run --all-features --release --workspace --exclude tari_integration_tests --profile ci --no-fail-fast"
ci-cucumber = "test  --release  --test cucumber --all-features  --package tari_integration_tests -- -t @critical"
ci-check = "check --release --all-targets --workspace --exclude tari_integration_tests --locked"
ci-lcheck = "lcheck --release --all-targets --workspace --exclude tari_integration_tests --locked"
